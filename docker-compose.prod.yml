services:
  postgres:
    image: postgres:16
    container_name: lv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lv_backend}
      POSTGRES_USER: ${POSTGRES_USER:-lv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lv_user} -d ${POSTGRES_DB:-lv_backend}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lv-network

  redis:
    image: redis:7-alpine
    container_name: lv-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - lv-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lv-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      LV_KNOWLEDGE_DATA_DIR: /data/knowledge
    volumes:
      - /opt/lv/private_data/processed/knowledge:/data/knowledge:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - lv-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_AMAP_KEY: ${VITE_AMAP_KEY:-}
        VITE_AMAP_SECURITY_JS_CODE: ${VITE_AMAP_SECURITY_JS_CODE:-}
        VITE_ANALYTICS_ENABLED: ${VITE_ANALYTICS_ENABLED:-true}
    container_name: lv-frontend
    restart: unless-stopped
    networks:
      - lv-network

  nginx:
    image: nginx:1.27-alpine
    container_name: lv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - lv-network

volumes:
  pgdata:
  redisdata:

networks:
  lv-network:
    driver: bridge
